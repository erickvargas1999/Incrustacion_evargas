<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Analítico – Qlik Cloud</title>

    <script
        crossorigin="anonymous"
        type="application/javascript"
        src="https://cdn.jsdelivr.net/npm/@qlik/embed-web-components@1/dist/index.min.js"
        data-host="https://l676lvg3emfvcq2.us.qlikcloud.com"
        data-web-integration-id="deldUOnOAI1lAtiqRYAfZbG0_OkzkJHs"
        data-auto-redirect="true" 
    ></script>
    
    <style>
		body { 
			font-family: Arial, sans-serif; 
			margin: 0; 
			background: #f5f6fa; 
		}
		
		header { 
			background: #0a7d5c; 
			color: white; 
			padding: 20px; 
			text-align: center; 
		}

		/* El grid que acomoda las 2 columnas sin romperlas */
		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr; /* Mitad y mitad exactas */
			gap: 20px;
			padding: 20px;
			max-width: 1200px; /* Centra el proyecto en pantallas gigantes */
			margin: 0 auto;
		}

		/* La tarjeta ahora es un bloque sólido */
		.card {
			background: white;
			border-radius: 10px;
			padding: 20px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			display: block; /* Quitamos el flex para no aplastar el gráfico */
		}

		h3 {
			margin-top: 0;
			margin-bottom: 15px;
			font-size: 1.1em;
			color: #333;
		}

		/* El seguro de vida para que Qlik se dibuje sí o sí */
		qlik-embed {
			display: block;
			width: 100%;
			height: 400px;       /* Altura principal */
			min-height: 400px;   /* Doble seguro para evitar el colapso */
		}

		/* Si lo abren en celular, pasa a una sola columna */
		@media (max-width: 800px) {
			.grid { 
				grid-template-columns: 1fr; 
			}
		}
	</style>
</head>

<body>

<header>
    <h1>Portal de Analítica Avanzada</h1>
    <p>Predicciones · Simulaciones · KPIs · Clustering</p>
</header>

<div class="grid">
    <div class="card">
        <h3>📈 Análisis de Rentabilidad</h3>
        <qlik-embed
          ui="analytics/chart"
          app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb"
          object-id="LSPRdu">
        </qlik-embed>
    </div>
	
    <div class="card">
        <h3>📊 Riesgo por Región</h3>
        <qlik-embed 
            ui="analytics/chart" 
            app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" 
            object-id="CkdCTK">
        </qlik-embed>
    </div>
	
    <div class="card">
        <h3>🎛️ Simulación What-If</h3>
        <qlik-embed 
            ui="analytics/chart" 
            app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" 
            object-id="CkdCTK">
        </qlik-embed>
    </div>
	
    <div class="card">
        <h3>👥 Segmentación de Clientes</h3>
        <qlik-embed 
            ui="analytics/chart" 
            app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" 
            object-id="CkdCTK">
        </qlik-embed>
    </div>
</div>

</body>
</html>
