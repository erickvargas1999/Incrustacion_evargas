<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Analítico – Qlik Cloud</title>

    <script
        crossorigin="anonymous"
        type="application/javascript"
        src="https://cdn.jsdelivr.net/npm/@qlik/embed-web-components@1/dist/index.min.js"
        data-host="https://l676lvg3emfvcq2.us.qlikcloud.com"
        data-web-integration-id="deldUOnOAI1lAtiqRYAfZbG0_OkzkJHs"
        data-auto-redirect="true" 
    ></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f6fa; }
        header { background: #0a7d5c; color: white; padding: 20px; text-align: center; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            /* El secreto: forzar una altura mínima total para la tarjeta */
            min-height: 500px; 
        }

        h3 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #333; }

        /* Contenedor que le dice a Qlik exactamente cuánto espacio tiene */
        .chart-box {
            flex: 1; /* Toma todo el espacio disponible debajo del título */
            width: 100%;
            min-height: 400px;
        }

        qlik-embed {
            display: block;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 800px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<header>
    <h1>Portal de Analítica Avanzada</h1>
    <p>Predicciones · Simulaciones · KPIs · Clustering</p>
</header>

<div class="grid">
    <div class="card">
        <h3>📈 Análisis de Rentabilidad</h3>
        <div class="chart-box">
            <qlik-embed ui="analytics/chart" app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" object-id="LSPRdu"></qlik-embed>
        </div>
    </div>
	
    <div class="card">
        <h3>📊 Riesgo por Región</h3>
        <div class="chart-box">
            <qlik-embed ui="analytics/chart" app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" object-id="CkdCTK"></qlik-embed>
        </div>
    </div>
	
    <div class="card">
        <h3>🎛️ Simulación What-If</h3>
        <div class="chart-box">
            <qlik-embed ui="analytics/chart" app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" object-id="CkdCTK"></qlik-embed>
        </div>
    </div>
	
    <div class="card">
        <h3>👥 Segmentación de Clientes</h3>
        <div class="chart-box">
            <qlik-embed ui="analytics/chart" app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" object-id="CkdCTK"></qlik-embed>
        </div>
    </div>
</div>

</body>
</html>
