<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Analítico – Qlik Cloud</title>

    <script
        crossorigin="anonymous"
        type="application/javascript"
        src="https://cdn.jsdelivr.net/npm/@qlik/embed-web-components@1/dist/index.min.js"
        data-host="https://l676lvg3emfvcq2.us.qlikcloud.com"
        data-web-integration-id="deldUOnOAI1lAtiqRYAfZbG0_OkzkJHs"
        data-auto-redirect="true" 
    ></script>
    
    <style>
		body { font-family: Arial, sans-serif; margin: 0; background: #f5f6fa; }
		header { background: #0a7d5c; color: white; padding: 20px; text-align: center; }

		/* Contenedor principal */
		.grid { 
			display: grid;
			/* Forzamos 2 columnas exactas que se reparten el 50% cada una */
			grid-template-columns: calc(50% - 10px) calc(50% - 10px); 
			gap: 20px; 
			padding: 20px;
			max-width: 1200px; /* Centra el portal para que no sea infinito en pantallas anchas */
			margin: 0 auto;
		}

		.card { 
			background: white; 
			border-radius: 10px; 
			padding: 15px; 
			box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			display: flex;
			flex-direction: column;
			overflow: hidden; /* Corta cualquier desborde */
		}

		h3 { margin: 0 0 10px 0; font-size: 1.1em; }

		/* Ajuste específico para el componente de Qlik */
		qlik-embed {
			display: block;
			width: 100% !important;
			height: 450px; /* Altura fija para que el gráfico respire */
			border: none;
		}

		/* En celulares, que se vea una sola columna */
		@media (max-width: 768px) {
			.grid { grid-template-columns: 1fr; }
		}
	</style>
</head>

<body>

<header>
    <h1>Portal de Analítica Avanzada</h1>
    <p>Predicciones · Simulaciones · KPIs · Clustering</p>
</header>

<div class="grid">
    <div class="card">
        <h3>📈 Análisis de Rentabilidad</h3>
        <qlik-embed
          ui="analytics/chart"
          app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb"
          object-id="LSPRdu">
        </qlik-embed>
    </div>
	
    <div class="card">
        <h3>📊 Riesgo por Región</h3>
        <qlik-embed 
            ui="analytics/chart" 
            app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" 
            object-id="CkdCTK">
        </qlik-embed>
    </div>
	
    <div class="card">
        <h3>🎛️ Simulación What-If</h3>
        <qlik-embed 
            ui="analytics/chart" 
            app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" 
            object-id="CkdCTK">
        </qlik-embed>
    </div>
	
    <div class="card">
        <h3>👥 Segmentación de Clientes</h3>
        <qlik-embed 
            ui="analytics/chart" 
            app-id="1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb" 
            object-id="CkdCTK">
        </qlik-embed>
    </div>
</div>

</body>
</html>
