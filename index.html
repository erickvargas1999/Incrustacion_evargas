<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Analítico – Qlik Cloud</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f5f6fa;
        }

        header{
            background:#0a7d5c;
            color:white;
            padding:20px;
            text-align:center;
        }

        .grid{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            border-radius:10px;
            padding:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        iframe{
            width:100%;
            height:420px;
            border:none;
        }

        h3{
            margin:10px 0;
        }

        footer{
            text-align:center;
            padding:10px;
            color:#666;
        }
    </style>
</head>

<body>

<header>
    <h1>Portal de Analítica Avanzada</h1>
    <p>Predicciones · Simulaciones · KPIs · Clustering</p>
</header>

<div class="grid">

    <div class="card">
        <h3>📈 KPI Ventas y Beneficio</h3>
        <iframe src="https://zzkkztrj59qmaio.us.qlikcloud.com/single/?appid=af6b7c15-25ea-4a34-83a1-d0e0297d7ac4&obj=TUMNwQ&theme=horizon&opt=ctxmenu,currsel" style="border:none;width:100%;height:100%;"></iframe>
    </div>

    <div class="card">
        <h3>⚠️ Riesgo de Devolución (Modelo ML)</h3>
        <iframe src="https://l676lvg3emfvcq2.us.qlikcloud.com/single/?appid=1e4d2ed8-9b9a-4785-b5c2-cb6f647703eb&obj=LSPRdu&theme=horizon&opt=ctxmenu,currsel" style="border:none;width:100%;height:100%;"></iframe>
    </div>

    <div class="card">
        <h3>🎛️ Simulación What-If</h3>
        <iframe src="https://zzkkztrj59qmaio.us.qlikcloud.com/single/?appid=af6b7c15-25ea-4a34-83a1-d0e0297d7ac4&obj=TJJZkd&theme=horizon&opt=ctxmenu,currsel" style="border:none;width:100%;height:100%;"></iframe>
    </div>

    <div class="card">
        <h3>👥 Segmentación / Clusters</h3>
        <iframe src="https://zzkkztrj59qmaio.us.qlikcloud.com/single/?appid=af6b7c15-25ea-4a34-83a1-d0e0297d7ac4&obj=TJJZkd&theme=horizon&opt=ctxmenu,currsel" style="border:none;width:100%;height:100%;"></iframe>
    </div>

</div>

<footer>
    Integración de analítica mediante embedding de Qlik Cloud
</footer>

</html>
